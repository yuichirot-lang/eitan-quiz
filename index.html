<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英単語テスト - Here We Go 1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .container {
    background: white;
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  h1 { text-align: center; color: #333; font-size: 1.6rem; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }

  /* 入力フォーム共通 */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.85rem; color: #555; font-weight: 600; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 14px 16px;
    border: 2px solid #e0e0e0; border-radius: 12px;
    font-size: 1rem; color: #333;
    transition: border-color 0.2s;
    appearance: none; -webkit-appearance: none;
    background: white;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: #667eea;
  }

  /* 単元グリッド */
  .unit-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;
  }
  .unit-btn {
    background: #f0f4ff; border: 2px solid #dde4ff; border-radius: 12px;
    padding: 10px 6px; text-align: center; cursor: pointer;
    transition: all 0.2s; font-size: 0.85rem; color: #5566aa; font-weight: 600;
  }
  .unit-btn.selected { background: #667eea; border-color: #667eea; color: white; }
  .unit-btn .count { display: block; font-size: 0.7rem; font-weight: 400; margin-top: 2px; opacity: 0.8; }

  /* ボタン */
  .btn {
    display: block; width: 100%; padding: 16px;
    border: none; border-radius: 14px;
    font-size: 1.1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; margin-top: 12px;
  }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f5f5f5; color: #555; }
  .btn-danger { background: #fff0f0; color: #e53935; border: 2px solid #ffcdd2; }

  /* クイズヘッダー */
  .quiz-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .progress-bar {
    height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 4px; transition: width 0.4s ease;
  }

  /* 問題表示 */
  .question-label { font-size: 0.85rem; color: #888; text-align: center; margin-bottom: 10px; }
  .question-text {
    font-size: 2rem; font-weight: 700; text-align: center; color: #222;
    padding: 20px; background: #f8f9ff; border-radius: 16px;
    min-height: 90px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .pos-badge {
    display: block; background: #e8eaff; color: #667eea;
    font-size: 0.75rem; padding: 2px 8px; border-radius: 20px;
    width: fit-content; margin: 0 auto 20px;
  }

  /* 記述式入力 */
  .answer-area { margin-bottom: 16px; }
  .answer-input {
    width: 100%; padding: 18px 20px;
    border: 3px solid #e0e0e0; border-radius: 16px;
    font-size: 1.4rem; text-align: center; color: #333;
    transition: border-color 0.2s; letter-spacing: 0.05em;
  }
  .answer-input:focus { outline: none; border-color: #667eea; }
  .answer-input.correct { border-color: #4caf50; background: #f1faf1; color: #2e7d32; }
  .answer-input.wrong { border-color: #ef5350; background: #fff5f5; color: #c62828; }
  .answer-input:disabled { cursor: default; }
  .answer-hint { font-size: 0.75rem; color: #aaa; text-align: center; margin-top: 6px; }

  /* フィードバック */
  .feedback {
    text-align: center; font-size: 1rem; font-weight: 700;
    padding: 12px; border-radius: 12px; margin-bottom: 12px;
  }
  .feedback.correct { background: #e8f8e8; color: #2e7d32; }
  .feedback.wrong { background: #ffeaea; color: #c62828; }
  .correct-answer { font-size: 0.9rem; font-weight: 400; margin-top: 4px; }

  /* 結果画面 */
  .score-screen { text-align: center; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2); color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 20px; box-shadow: 0 8px 30px rgba(102,126,234,0.4);
  }
  .score-number { font-size: 2.8rem; font-weight: 800; }
  .score-label { font-size: 0.8rem; opacity: 0.9; }
  .score-message { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; color: #333; }
  .score-detail { color: #888; margin-bottom: 20px; font-size: 0.9rem; }

  /* 答え一覧 */
  .answer-list { text-align: left; margin-bottom: 20px; max-height: 260px; overflow-y: auto; }
  .answer-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; font-size: 0.9rem;
  }
  .answer-item.ok { background: #f1faf1; }
  .answer-item.ng { background: #fff5f5; }
  .answer-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .answer-item .question-word { font-weight: 600; color: #444; }
  .answer-item .your-answer { color: #888; font-size: 0.82rem; }
  .answer-item .correct-word { color: #2e7d32; font-size: 0.82rem; }

  /* 送信状態 */
  .sending { color: #667eea; font-size: 0.9rem; text-align: center; margin: 8px 0; }
  .send-ok { color: #4caf50; font-size: 0.9rem; text-align: center; margin: 8px 0; }
  .send-err { color: #ef5350; font-size: 0.9rem; text-align: center; margin: 8px 0; }

  .hidden { display: none; }
  .student-badge {
    background: #f0f4ff; border-radius: 10px; padding: 8px 14px;
    font-size: 0.82rem; color: #667eea; font-weight: 600;
    text-align: center; margin-bottom: 16px;
  }

  .sub-select-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .sub-select-row button {
    flex: 1; padding: 8px; font-size: 0.8rem; border-radius: 8px;
    border: 1px solid #dde4ff; background: #f0f4ff; color: #667eea;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 画面①：生徒情報入力 -->
  <div id="screen-info">
    <h1>📚 英単語テスト</h1>
    <p class="subtitle">Here We Go! 1年生</p>

    <div class="field">
      <label>学年</label>
      <select id="inp-grade">
        <option value="">選んでください</option>
        <option value="1年">1年</option>
        <option value="2年">2年</option>
        <option value="3年">3年</option>
      </select>
    </div>
    <div class="field">
      <label>クラス</label>
      <select id="inp-class">
        <option value="">選んでください</option>
        <option value="1組">1組</option>
        <option value="2組">2組</option>
        <option value="3組">3組</option>
        <option value="4組">4組</option>
        <option value="5組">5組</option>
      </select>
    </div>
    <div class="field">
      <label>名前</label>
      <input type="text" id="inp-name" placeholder="例：山田 太郎">
    </div>
    <button class="btn btn-primary" id="info-next-btn" onclick="goToSelect()" disabled>次へ ▶</button>
  </div>

  <!-- 画面②：単元選択 -->
  <div id="screen-select" class="hidden">
    <h1>📚 英単語テスト</h1>
    <div class="student-badge" id="student-badge"></div>

    <p style="font-size:0.85rem; color:#666; margin-bottom:10px; font-weight:600;">▼ 練習する単元を選んでください（複数選択可）</p>
    <div class="unit-grid" id="unit-grid"></div>
    <div class="sub-select-row">
      <button onclick="selectAll()">すべて選択</button>
      <button onclick="clearAll()">選択解除</button>
    </div>
    <div style="background:#f8f9ff; border-radius:12px; padding:12px; margin-bottom:14px; font-size:0.85rem; color:#555;">
      <b>出題形式：</b>日本語 → 英語を記述<br>
      <span id="selected-count" style="color:#667eea; font-weight:700;">0語</span>から
      <span id="quiz-count-display">10問</span>出題
    </div>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <span style="font-size:0.85rem; color:#666;">問題数：</span>
      <select id="num-questions" onchange="updateCount()" style="padding:6px 10px; border-radius:8px; border:1px solid #ddd; font-size:0.85rem;">
        <option value="5">5問</option>
        <option value="10" selected>10問</option>
        <option value="20">20問</option>
        <option value="30">30問</option>
        <option value="all">全問</option>
      </select>
    </div>
    <button class="btn btn-primary" id="start-btn" onclick="startQuiz()" disabled>テストをスタート ▶</button>
    <button class="btn btn-secondary" onclick="showScreen('info')" style="margin-top:6px; font-size:0.85rem; padding:10px;">← 名前を変更</button>
  </div>

  <!-- 画面③：クイズ -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <span style="font-size:0.85rem; color:#888;" id="q-counter">1 / 10</span>
      <span style="font-size:0.85rem; color:#667eea; font-weight:700;" id="score-display">✅ 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <p class="question-label">日本語の意味に合う英語を入力してください</p>
    <div class="question-text" id="question-text"></div>
    <span class="pos-badge" id="pos-badge"></span>

    <div class="answer-area">
      <input type="text" class="answer-input" id="answer-input"
        placeholder="英語で入力してください"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') submitAnswer()">
      <p class="answer-hint">Enterキーまたはボタンで回答</p>
    </div>

    <div class="feedback hidden" id="feedback">
      <div id="feedback-text"></div>
      <div class="correct-answer" id="correct-answer-text"></div>
    </div>

    <button class="btn btn-primary hidden" id="submit-btn" onclick="submitAnswer()">回答する ✏️</button>
    <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">次の問題 ▶</button>
    <button class="btn btn-secondary" onclick="confirmQuit()" style="margin-top:8px; font-size:0.85rem; padding:10px;">やめる</button>
  </div>

  <!-- 画面④：結果 -->
  <div id="screen-result" class="hidden score-screen">
    <h1 style="margin-bottom:16px;">テスト結果 📋</h1>
    <div class="student-badge" id="result-student-badge"></div>

    <div class="score-circle">
      <span class="score-number" id="result-score">0</span>
      <span class="score-label">/ <span id="result-total">10</span>問正解</span>
    </div>
    <p class="score-message" id="result-message"></p>
    <p class="score-detail" id="result-detail"></p>

    <!-- 答え一覧 -->
    <div class="answer-list" id="answer-list"></div>

    <!-- 送信ステータス -->
    <div id="send-status"></div>

    <button class="btn btn-primary" onclick="retryQuiz()">もう一度同じ単元で</button>
    <button class="btn btn-secondary" onclick="showScreen('select')">単元を選び直す</button>
  </div>

</div>

、心","p":"名"},{"e":"beat","j":"どきどきする","p":"動"},{"e":"way","j":"道、道筋","p":"名"},{"e":"each","j":"それぞれの、各自の","p":"形"},{"e":"fast","j":"速く","p":"副"},{"e":"on","j":"【状態】…している最中で、…中で","p":"前"},{"e":"these","j":"これらの","p":"形"}]};
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXR9Uflsx8fmAmADTzVHJxgm0dWfjoAXK2m00Bp2it896lGJ43D6F3CPUrES08KMJqtg/exec';

const POS_MAP = {'名':'名詞','動':'動詞','形':'形容詞','副':'副詞','代':'代名詞','前':'前置詞','接':'接続詞','冠':'冠詞','連':'連語・フレーズ','間':'間投詞'};

let student = { grade: '', cls: '', name: '' };
let selectedUnits = [];
let quizWords = [];
let current = 0;
let score = 0;
let answered = false;
let answerLog = [];

// ---- 画面①：生徒情報 ----
['inp-grade','inp-class','inp-name'].forEach(id => {
  document.getElementById(id).addEventListener('input', checkInfoForm);
});
function checkInfoForm(){
  const g = document.getElementById('inp-grade').value;
  const c = document.getElementById('inp-class').value;
  const n = document.getElementById('inp-name').value.trim();
  document.getElementById('info-next-btn').disabled = !(g && c && n);
}
function goToSelect(){
  student.grade = document.getElementById('inp-grade').value;
  student.cls   = document.getElementById('inp-class').value;
  student.name  = document.getElementById('inp-name').value.trim();
  const badge = student.grade + ' ' + student.cls + '　' + student.name;
  document.getElementById('student-badge').textContent = '👤 ' + badge;
  document.getElementById('result-student-badge').textContent = '👤 ' + badge;
  initUnitGrid();
  showScreen('select');
}

// ---- 画面②：単元選択 ----
function initUnitGrid(){
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  Object.keys(WORDS).forEach(unit => {
    const btn = document.createElement('div');
    btn.className = 'unit-btn';
    btn.dataset.unit = unit;
    btn.innerHTML = unit + '<span class="count">' + WORDS[unit].length + '語</span>';
    btn.onclick = () => toggleUnit(unit, btn);
    grid.appendChild(btn);
  });
  updateSelectedCount();
}
function toggleUnit(unit, btn){
  const idx = selectedUnits.indexOf(unit);
  if(idx === -1){ selectedUnits.push(unit); btn.classList.add('selected'); }
  else { selectedUnits.splice(idx, 1); btn.classList.remove('selected'); }
  updateSelectedCount();
}
function selectAll(){
  selectedUnits = Object.keys(WORDS);
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.add('selected'));
  updateSelectedCount();
}
function clearAll(){
  selectedUnits = [];
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
  updateSelectedCount();
}
function updateSelectedCount(){
  const total = selectedUnits.reduce((s,u) => s + (WORDS[u]?WORDS[u].length:0), 0);
  document.getElementById('selected-count').textContent = total + '語';
  document.getElementById('start-btn').disabled = total < 1;
  updateCount();
}
function updateCount(){
  const sel = document.getElementById('num-questions').value;
  const total = selectedUnits.reduce((s,u) => s + (WORDS[u]?WORDS[u].length:0), 0);
  const count = sel === 'all' ? total : Math.min(parseInt(sel), total);
  document.getElementById('quiz-count-display').textContent = count + '問';
}

// ---- 画面③：クイズ ----
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startQuiz(){
  let pool = [];
  selectedUnits.forEach(u => { if(WORDS[u]) pool = pool.concat(WORDS[u]); });
  pool = shuffle(pool);
  const sel = document.getElementById('num-questions').value;
  const count = sel === 'all' ? pool.length : Math.min(parseInt(sel), pool.length);
  quizWords = pool.slice(0, count);
  current = 0; score = 0; answerLog = [];
  showScreen('quiz');
  showQuestion();
}

function showQuestion(){
  const w = quizWords[current];
  const total = quizWords.length;
  document.getElementById('q-counter').textContent = (current+1) + ' / ' + total;
  document.getElementById('score-display').textContent = '✅ ' + score;
  document.getElementById('progress-fill').style.width = (current/total*100) + '%';
  document.getElementById('question-text').textContent = w.j;
  const pos = POS_MAP[w.p] || w.p;
  document.getElementById('pos-badge').textContent = pos ? '【' + pos + '】' : '';

  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = 'answer-input';
  inp.disabled = false;
  document.getElementById('feedback').className = 'feedback hidden';
  document.getElementById('submit-btn').className = 'btn btn-primary';
  document.getElementById('next-btn').className = 'btn btn-primary hidden';
  answered = false;
  setTimeout(() => inp.focus(), 100);
}

function normalizeAnswer(s){
  return s.trim().toLowerCase().replace(/[！!？?。、.,]/g,'');
}

function submitAnswer(){
  if(answered) return;
  const w = quizWords[current];
  const inp = document.getElementById('answer-input');
  const userAns = inp.value;
  if(!userAns.trim()){ inp.focus(); return; }

  answered = true;
  inp.disabled = true;
  document.getElementById('submit-btn').className = 'btn btn-primary hidden';
  document.getElementById('next-btn').className = 'btn btn-primary';

  const correct = normalizeAnswer(userAns) === normalizeAnswer(w.e);
  const fb = document.getElementById('feedback');
  const fbText = document.getElementById('feedback-text');
  const caText = document.getElementById('correct-answer-text');

  if(correct){
    inp.classList.add('correct');
    fb.className = 'feedback correct';
    fbText.textContent = '⭕ 正解！';
    caText.textContent = '';
    score++;
  } else {
    inp.classList.add('wrong');
    fb.className = 'feedback wrong';
    fbText.textContent = '❌ 不正解';
    caText.textContent = '正解：' + w.e;
  }
  document.getElementById('score-display').textContent = '✅ ' + score;

  answerLog.push({
    japanese: w.j,
    correct: w.e,
    student: userAns,
    isCorrect: correct
  });
}

function nextQuestion(){
  current++;
  if(current >= quizWords.length){ showResult(); }
  else { showQuestion(); }
}

function confirmQuit(){
  if(confirm('テストをやめますか？結果は送信されません。')){ showScreen('select'); }
}

// ---- 画面④：結果 ----
function showResult(){
  const total = quizWords.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-total').textContent = total;
  document.getElementById('result-detail').textContent = '正答率 ' + pct + '% (' + score + '/' + total + '問)';

  let msg = '';
  if(pct===100) msg='完璧です！🏆';
  else if(pct>=80) msg='すばらしい！✨';
  else if(pct>=60) msg='よくできました！👍';
  else if(pct>=40) msg='もう少し頑張ろう！💪';
  else msg='復習してみよう！📖';
  document.getElementById('result-message').textContent = msg;

  // 答え一覧
  const list = document.getElementById('answer-list');
  list.innerHTML = '';
  answerLog.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'answer-item ' + (a.isCorrect ? 'ok' : 'ng');
    div.innerHTML =
      '<span class="answer-icon">' + (a.isCorrect ? '⭕' : '❌') + '</span>' +
      '<div>' +
        '<div class="question-word">' + (i+1) + '. ' + a.japanese + '</div>' +
        (a.isCorrect
          ? '<div class="correct-word">✔ ' + a.correct + '</div>'
          : '<div class="your-answer">あなた：' + (a.student||'(未入力)') + '</div>' +
            '<div class="correct-word">正解：' + a.correct + '</div>'
        ) +
      '</div>';
    list.appendChild(div);
  });

  showScreen('result');
  sendResult(pct, total);
}

// ---- Google Sheets送信 ----
function sendResult(pct, total){
  const statusEl = document.getElementById('send-status');
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'APPS_SCRIPT_URL_PLACEHOLDER'){
    statusEl.className = 'send-err';
    statusEl.textContent = '⚠️ 送信先が未設定です（先生に連絡してください）';
    return;
  }
  statusEl.className = 'sending';
  statusEl.textContent = '📤 結果を送信中...';

  const units = selectedUnits.join('・');
  const wrongWords = answerLog.filter(a => !a.isCorrect).map(a => a.japanese + '→' + a.correct).join(' / ');

  const payload = {
    timestamp: new Date().toLocaleString('ja-JP'),
    grade: student.grade,
    class: student.cls,
    name: student.name,
    units: units,
    score: score,
    total: total,
    percentage: pct,
    wrongWords: wrongWords || 'なし'
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    statusEl.className = 'send-ok';
    statusEl.textContent = '✅ 先生に結果を送信しました！';
  })
  .catch(() => {
    statusEl.className = 'send-err';
    statusEl.textContent = '⚠️ 送信できませんでした（Wi-Fiを確認してください）';
  });
}

function retryQuiz(){ startQuiz(); }

function showScreen(name){
  ['info','select','quiz','result'].forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('hidden', s !== name);
  });
}
</script>
